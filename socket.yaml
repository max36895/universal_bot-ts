version: 2

projects:
    - path: .
      capabilities:
          # Разрешаем доступ только к конкретным переменным из env, так как они могут быть нужны для работы.
          environment:
              - VIBER_TOKEN
              - TELEGRAM_TOKEN
              - VK_TOKEN
              - MAX_TOKEN
              - VK_CONFIRMATION_TOKEN
              - MARUSIA_TOKEN
              - YANDEX_TOKEN
              - DB_HOST
              - DB_USER
              - DB_PASSWORD
              - DB_NAME
          # Разрешаем и чтение, и запись в файловую систему. Нужно для записи логов или для сохранения данных в файловой бд.
          filesystem: write
          # Разрешаем любые сетевые запросы, так как они необходимы для работы с платформами.
          network: true

      ignorePaths:
          - 'examples/'
          - 'examples/**'
          - 'tests/'
          - 'tests/**'
